# CreativePOS — Docker Compose
# Usage: docker compose up -d

services:
  nginx:
    image: nginx:alpine
    container_name: creativepos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ../backend/storage/app/public:/var/www/storage:ro
    depends_on:
      - frontend
      - backend
      - reverb
    networks:
      - creativepos

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: creativepos-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file:
      - ../frontend/.env.local
    networks:
      - creativepos

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: creativepos-backend
    restart: unless-stopped
    volumes:
      - ../backend/storage:/var/www/html/storage
      - ../backend/bootstrap/cache:/var/www/html/bootstrap/cache
    env_file:
      - ../backend/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - creativepos

  reverb:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: creativepos-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    env_file:
      - ../backend/.env
    depends_on:
      - redis
    networks:
      - creativepos

  horizon:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: creativepos-horizon
    restart: unless-stopped
    command: php artisan horizon
    env_file:
      - ../backend/.env
    depends_on:
      - redis
      - mysql
    networks:
      - creativepos

  scheduler:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: creativepos-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    env_file:
      - ../backend/.env
    depends_on:
      - backend
    networks:
      - creativepos

  mysql:
    image: mysql:8.0
    container_name: creativepos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-creativepos}
      MYSQL_USER: ${DB_USERNAME:-creativepos}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - creativepos

  redis:
    image: redis:7-alpine
    container_name: creativepos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - creativepos

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  creativepos:
    driver: bridge