upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

upstream reverb {
    server reverb:8080;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

server {
    listen 80;
    server_name creativepos.app api.creativepos.app ws.creativepos.app *.creativepos.app;
    return 301 https://$host$request_uri;
}

# Frontend
server {
    listen 443 ssl http2;
    server_name creativepos.app *.creativepos.app;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static {
        proxy_pass http://frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# Backend API
server {
    listen 443 ssl http2;
    server_name api.creativepos.app;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 50M;

    location /api/v1/auth {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://backend;
        include /etc/nginx/conf.d/proxy-params.conf;
    }

    location /api {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend;
        include /etc/nginx/conf.d/proxy-params.conf;
    }

    location /storage {
        alias /var/www/storage;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /horizon {
        proxy_pass http://backend;
        include /etc/nginx/conf.d/proxy-params.conf;
    }

    location /broadcasting/auth {
        proxy_pass http://backend;
        include /etc/nginx/conf.d/proxy-params.conf;
    }
}

# WebSocket (Reverb)
server {
    listen 443 ssl http2;
    server_name ws.creativepos.app;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://reverb;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}