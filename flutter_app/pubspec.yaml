name: creativepos_mobile
description: CreativePOS Android — Flutter client for existing Laravel API
publish_to: "none"
version: 1.3.2+19

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State & navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Network
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4

  # Storage
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  open_filex: ^4.7.0

  # Device
  local_auth: ^2.3.0
  geolocator: ^13.0.4
  mobile_scanner: ^6.0.10
  image_picker: ^1.1.2
  permission_handler: ^11.4.0
  package_info_plus: ^8.3.0
  device_info_plus: ^11.3.3

  # Maps & notifications (wired in later phases)
  google_maps_flutter: ^2.12.1
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

  # Printer (phase 6)
  esc_pos_utils_plus: ^2.0.4
  print_bluetooth_thermal: ^1.1.6

  # Utils
  uuid: ^4.5.1
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/